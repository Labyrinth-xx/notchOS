<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>notchOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Aurora glow layer (behind pill) -->
  <div id="pillGlow"></div>

  <!-- Collapsed pill with wings -->
  <div id="pill">
    <div class="wing wing-left" id="wingLeft"></div>
    <div class="pill-center">
      <div class="status-dot empty" id="pillDot"></div>
      <span class="pill-text" id="pillText">No sessions</span>
      <span class="pill-count" id="pillCount"></span>
    </div>
    <div class="wing wing-right" id="wingRight"></div>
  </div>

  <!-- Expanded dashboard -->
  <div id="dashboard">
    <canvas id="confettiCanvas"></canvas>
    <div class="dash-header">
      <span class="dash-title">Claude Sessions</span>
      <span class="session-count" id="sessionCount">0 active</span>
    </div>
    <div class="sessions-list" id="sessionsList">
      <div class="empty-state">No active sessions</div>
    </div>
  </div>

  <!-- Module system (load before app.js) -->
  <script src="modules/base-module.js"></script>
  <script src="modules/session-status.js"></script>
  <!-- Main app -->
  <script src="app.js"></script>
</body>
</html>
