<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>notchOS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Aurora glow layer (behind pill) -->
  <div id="pillGlow"></div>

  <!-- Left bubble (secondary activity, hidden by default) -->
  <div id="bubbleLeft">
    <span class="bubble-icon" id="bubbleLeftIcon"></span>
  </div>

  <!-- Collapsed pill with wings -->
  <div id="pill">
    <div class="wing wing-left" id="wingLeft"></div>
    <div class="pill-center">
      <div class="status-dot empty" id="pillDot"></div>
      <span class="pill-text" id="pillText">No sessions</span>
      <span class="pill-count" id="pillCount"></span>
    </div>
    <div class="wing wing-right" id="wingRight"></div>
  </div>

  <!-- Expanded dashboard -->
  <div id="dashboard">
    <canvas id="confettiCanvas"></canvas>
    <div class="dash-header">
      <span class="dash-title">notchOS</span>
      <span class="session-count" id="sessionCount">0 active</span>
      <button class="settings-btn" id="settingsBtn" title="Settings" onclick="toggleSettingsPanel()">⚙</button>
    </div>
    <!-- Tab bar (visible when 2+ activities) -->
    <div class="tab-bar" id="tabBar"></div>
    <!-- Tab content -->
    <div class="tab-content" id="tabContent">
      <div class="tab-pane active" id="pane-claude">
        <div class="sessions-list" id="sessionsList">
          <div class="empty-state">No active sessions</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Shared utilities (must load first) -->
  <script src="shared.js"></script>
  <!-- Activity manager (must load before modules that call activityManager) -->
  <script src="activity-manager.js"></script>
  <!-- Module system -->
  <script src="modules/base-module.js"></script>
  <script src="modules/session-status.js"></script>
  <script src="modules/music-module.js"></script>
  <script src="modules/timer-module.js"></script>
  <script src="modules/notification-module.js"></script>
  <!-- Main app -->
  <script src="app.js"></script>
</body>
</html>
